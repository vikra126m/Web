<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Desmos Projects</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: #333; }
        .project-container {
            width: 90%;
            max-width: 900px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        .project-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
            color: #0073e6;
        }
        iframe {
            border: 1px solid #ccc;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <h1>Mere Desmos Projects</h1>

    <div class="project-container">
        <div class="project-title">1. 2D Graphing Project</div>
        <iframe src="https://www.desmos.com/calculator/injgdzqynu?embed" 
                width="100%" 
                height="500px" 
                style="border: 1px solid #ccc" 
                frameborder=0>
        </iframe>
    </div>

    <div class="project-container">
        <div class="project-title">2. 3D Project</div>
        <iframe src="https://www.desmos.com/3d/uvhef2ju8q?embed" 
                width="100%" 
                height="500px" 
                style="border: 1px solid #ccc" 
                frameborder=0>
        </iframe>
    </div>

</body>
</html>
